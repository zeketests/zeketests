name: Update YouTube Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-youtube-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DenverCoder1/github-readme-youtube-cards@v1
        with:
          channel_id: "@zekeTests"
          youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          max_videos: 6
          card_width: 250
          background_color: "#0d1117"
          title_color: "#ffffff"
          stats_color: "#dedede"
          border_radius: 8

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update YouTube cards"
          git push
